<!doctype html>
<html>
  <head>
    <script type="module" src="./script.js"></script>
    <link rel="stylesheet" type="text/css" href="style.css" />
  </head>
  <body
    style="
      font-family: &quot;Andale Mono&quot;, monospace;
      background-color: #16b726;
      background-image: url(./wallpaper.jpg);
      background-size: cover;
      margin: 0;
      padding: 0;
    "
  >
    <div
      style="
        display: flex;
        justify-content: space-between;
        background-color: rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(1px);
        color: #fff;
      "
    >
      <p
        id="welcomeopen"
        style="margin: 0; padding: 10px; cursor: pointer; user-select: none"
      >
        Elias OS
      </p>
      <p style="margin: 0; padding: 10px">
        <a
          style="color: #fff; text-decoration: none"
          href="https://github.com/747elias/elias-os"
          >Source Code</a
        >
      </p>
      <p id="timelEment" style="margin: 0; padding: 10px">Time</p>
    </div>

    <div id="welcome" class="window" styles="styles">
      <div id="welcomeheader" class="windowheader">
        <span id="welcomeclose" class="closebutton">X</span>

        <span style="font-weight: bold">Welcome to Elias OS</span>

        <span style="width: 50px"></span>
      </div>
      <h1
        style="
          color: rgb(0, 128, 255);
          margin: 4px;
          padding: 10px;
          text-align: center;
        "
      >
        Welcome to Elias OS
      </h1>
      <h2 style="text-align: center">
        Elias OS is a custom operating system built from scratch.
      </h2>
      <p style="color: rgb(76, 8, 186); text-align: center">
        Thanks SerenityUX and Hackclub for the Tutorial and Motivation!
      </p>
      <div style="text-align: center">
        <img style="width: 55%; border-radius: 25px" src="1.jpg" />
      </div>
      <div style="text-align: center">
        <a style="color: #000000" href="https://github.com/747elias"
          >My GitHub</a
        >
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
